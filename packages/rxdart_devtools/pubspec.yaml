name: rxdart_devtools
description: A Dart & Flutter DevTools extension for inspecting RxDart Subjects and Dart Streams. Simple SDK to set up for value/error introspection and injection.
version: 0.1.1
repository: https://github.com/KijongHan/rxdart_devtools
issue_tracker: https://github.com/KijongHan/rxdart_devtools/issues
topics:
  - rxdart
  - devtools
  - streams
  - debugging
  - flutter

resolution: workspace

environment:
  sdk: ^3.6.0
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  json_annotation: ^4.9.0
  meta: ^1.16.0
  rxdart: ^0.28.0
  uuid: ^4.5.3
  get_it: ^9.0.0
  collection: ^1.19.1
  result_dart: ^2.2.0

dev_dependencies:
  build_runner: ^2.4.13
  flutter_test:
    sdk: flutter
  json_serializable: ^6.8.0
  lints: ^5.1.0
  test: ^1.25.0
