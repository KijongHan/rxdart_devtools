name: _rxdart_devtools_workspace
publish_to: none

environment:
  sdk: ^3.6.0

workspace:
  - packages/rxdart_devtools
  - packages/rxdart_devtools_extension
  - example

dev_dependencies:
  melos: ^7.8.2

melos:
  command:
    bootstrap:
      runPubGetInParallel: false

  scripts:
    analyze:
      run: dart analyze .
      description: Run static analysis across the workspace.

    test:
      run: melos exec -c 1 --fail-fast -- "dart test"
      description: Run unit tests across all packages.
      packageFilters:
        dirExists:
          - test

    build_panel:
      run: dart tool/build_panel.dart
      description: Build the Flutter web panel and copy artifacts into the runtime package's extension/devtools/build directory.

    dev:example:chrome:
      run: cd example && flutter run -d chrome
      description: |
        Run the example app on Chrome (web). Note the VM service URI it prints,
        then paste it into the simulator launched by `dev:panel`.

    dev:example:android:
      run: cd example && flutter run -d emulator
      description: |
        Run the example app on a running Android emulator. Matches device IDs
        of the form `emulator-<port>` (ADB's convention). For a physical Android
        device, use its hardware serial: edit this script or run
        `cd example && flutter run -d <id>` (see `flutter devices`).

    dev:panel:
      run: cd packages/rxdart_devtools_extension && flutter run -d chrome --dart-define=use_simulated_environment=true
      description: Run the extension panel in Chrome under the simulated DevTools environment for hot-reload iteration. Paste the example app's VM service URI into the simulator UI.

    format:
      run: dart format .
      description: Format all Dart files in the workspace.

    dev:docs:
      run: cd docs && pnpm install && pnpm dev
      description: Run the Starlight docs site locally with hot reload at http://localhost:4321/rxdart_devtools/.

    build:docs:
      run: cd docs && pnpm install --frozen-lockfile && pnpm build
      description: Build the Starlight docs site into docs/dist (used by the GitHub Pages workflow).

    build:panel:simulated:
      run: cd packages/rxdart_devtools_extension && flutter build web --profile --output build/simulated --dart-define=use_simulated_environment=true
      description: |
        Build the extension panel as a static web bundle with the simulated DevTools environment wrapper enabled,
        into packages/rxdart_devtools_extension/build/simulated. Intended for docs/tutorial previewing only —
        NOT the publish artifact (that's produced by `build_panel` and lives at packages/rxdart_devtools/extension/devtools/build).
        Uses --profile because the simulator wrapper is gated on !kReleaseMode in devtools_extensions; a default
        --release build silently strips the simulator even with the dart-define flag set.

    run:panel:simulated:
      run: melos run build:panel:simulated && npx serve packages/rxdart_devtools_extension/build/simulated -l 3474
      description: |
        Build the simulated panel bundle (via `build:panel:simulated`) and then serve it
        at http://localhost:3474. The build step always runs first so the served bundle
        reflects the latest panel source.

    publish:dry:
      run: melos run build_panel && cd packages/rxdart_devtools && dart pub publish --dry-run
      description: |
        Build the panel (via `build_panel`) and run `dart pub publish --dry-run` against the runtime package.
        Surfaces anything pub.dev would reject — missing LICENSE, oversize description, malformed pubspec,
        invalid dependencies, etc. — without uploading anything. Run this before `publish`.

    publish:
      run: melos run build_panel && cd packages/rxdart_devtools && dart pub publish
      description: |
        Build the panel (via `build_panel`) and publish the runtime package to pub.dev.
        IRREVERSIBLE: published versions cannot be deleted (only retracted). Interactive — pub
        prints the upload manifest, asks for confirmation, then opens a browser for Google sign-in.
        Always run `publish:dry` first.
